<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
}
.holder {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
}
.item {
    width: 80px;
    height: 80px;
    font-size: 60px;
    color: black;
}
.item:nth-child(1) {
    background: red;
    order: 6;
}
.item:nth-child(2) {
    background: blue;
    order: 7;
}
.item:nth-child(3) {
    background: green;
    order: 1;
}
.item:nth-child(n+4) {
    background: green;
    order: 2;
}
</style>
</head>
<body>
<div class="holder">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
    <div class="item">7</div>
</div>
</body>
</html>
